spring:
  application:
    name: alert-engine-service

  datasource:
    url: jdbc:postgresql://postgres:5432/cryptopulse
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
        ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
